<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teleprompter — freyaivisions.de</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --accent: #c8ff00;
    --accent-dim: #a0cc00;
    --muted: #888;
  }

  body {
    font-family: 'Inter', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    flex-shrink: 0;
  }

  .header.hidden { display: none; }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-logo {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 18px;
    color: var(--bg);
  }

  .brand-name {
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.3px;
  }

  .brand-name span { color: var(--accent); }

  .brand-sub {
    font-size: 11px;
    color: var(--muted);
    margin-left: 12px;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    z-index: 100;
    flex-shrink: 0;
  }

  .controls.hidden { display: none; }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .control-group label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  .speed-value, .size-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    min-width: 28px;
    text-align: center;
  }

  /* Buttons */
  .btn {
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text);
    font-family: 'Inter', Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover {
    background: var(--border);
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .btn-primary:hover {
    background: var(--accent-dim);
    border-color: var(--accent-dim);
  }

  .btn-danger {
    border-color: #c0392b;
    color: #e74c3c;
  }

  .btn-danger:hover {
    background: #c0392b;
    color: #fff;
  }

  .separator {
    width: 1px;
    height: 24px;
    background: var(--border);
  }

  /* Main area */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* Edit mode */
  .edit-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px;
  }

  .edit-panel.hidden { display: none; }

  .edit-panel h2 {
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  #textInput {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', Arial, sans-serif;
    font-size: 18px;
    line-height: 1.7;
    padding: 20px;
    resize: none;
    outline: none;
  }

  #textInput::placeholder {
    color: #444;
  }

  #textInput:focus {
    border-color: var(--accent);
  }

  /* Prompter view */
  .prompter-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .prompter-wrap.hidden { display: none; }

  /* Guide line */
  .guide-line {
    position: absolute;
    top: 30%;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.3;
    z-index: 10;
    pointer-events: none;
  }

  .prompter-content {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 20vh 10vw;
    font-size: 48px;
    font-weight: 600;
    line-height: 1.6;
    text-align: center;
    transition: none;
    color: var(--text);
  }

  .prompter-content.mirrored {
    transform: scaleX(-1);
  }

  /* Gradient overlays */
  .fade-top, .fade-bottom {
    position: absolute;
    left: 0;
    right: 0;
    height: 15vh;
    pointer-events: none;
    z-index: 5;
  }

  .fade-top {
    top: 0;
    background: linear-gradient(to bottom, var(--bg), transparent);
  }

  .fade-bottom {
    bottom: 0;
    background: linear-gradient(to top, var(--bg), transparent);
  }

  /* Countdown overlay */
  .countdown-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    flex-direction: column;
  }

  .countdown-overlay.hidden { display: none; }

  .countdown-number {
    font-size: 120px;
    font-weight: 700;
    color: var(--accent);
    animation: pulse 0.5s ease-in-out;
  }

  .countdown-label {
    font-size: 18px;
    color: var(--muted);
    margin-top: 16px;
  }

  @keyframes pulse {
    0% { transform: scale(1.3); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Fullscreen hint */
  .fs-hint {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--muted);
    z-index: 50;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .fs-hint.show { opacity: 1; }

  /* Keyboard shortcuts bar */
  .shortcuts {
    padding: 8px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 20px;
    flex-shrink: 0;
  }

  .shortcuts.hidden { display: none; }

  .shortcuts kbd {
    background: var(--border);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'Inter', monospace;
    font-size: 11px;
    color: var(--text);
    margin-right: 4px;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header" id="header">
  <div style="display:flex;align-items:center;">
    <div class="brand">
      <div class="brand-logo">f</div>
      <div class="brand-name">freya<span>i</span>visions<span>.de</span></div>
    </div>
    <div class="brand-sub">Teleprompter</div>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn" id="btnEdit" onclick="showEdit()">Bearbeiten</button>
    <button class="btn btn-primary" id="btnStart" onclick="startPrompt()">Starten</button>
  </div>
</div>

<!-- Controls -->
<div class="controls" id="controls">
  <div class="control-group">
    <label>Geschwindigkeit</label>
    <input type="range" id="speedRange" min="1" max="10" value="4" oninput="updateSpeed()">
    <div class="speed-value" id="speedValue">4</div>
  </div>
  <div class="separator"></div>
  <div class="control-group">
    <label>Schriftgröße</label>
    <input type="range" id="sizeRange" min="24" max="96" value="48" oninput="updateSize()">
    <div class="size-value" id="sizeValue">48</div>
  </div>
  <div class="separator"></div>
  <button class="btn" id="btnMirror" onclick="toggleMirror()">Spiegeln</button>
  <button class="btn" id="btnFullscreen" onclick="toggleFullscreen()">Vollbild</button>
  <div style="flex:1"></div>
  <button class="btn" id="btnPause" onclick="togglePause()" style="display:none;">Pause</button>
  <button class="btn btn-danger" id="btnStop" onclick="stopPrompt()" style="display:none;">Stopp</button>
</div>

<!-- Main -->
<div class="main">
  <!-- Edit panel -->
  <div class="edit-panel" id="editPanel">
    <h2>Text eingeben</h2>
    <textarea id="textInput" placeholder="Ihren Text hier eingeben oder einfügen...

Tipp: Verwenden Sie leere Zeilen für Absatzpausen."></textarea>
  </div>

  <!-- Prompter view -->
  <div class="prompter-wrap hidden" id="prompterWrap">
    <div class="fade-top"></div>
    <div class="guide-line"></div>
    <div class="prompter-content" id="prompterContent"></div>
    <div class="fade-bottom"></div>
  </div>
</div>

<!-- Countdown -->
<div class="countdown-overlay hidden" id="countdown">
  <div class="countdown-number" id="countdownNum">3</div>
  <div class="countdown-label">Leertaste zum Überspringen</div>
</div>

<!-- Fullscreen hint -->
<div class="fs-hint" id="fsHint">ESC = Vollbild beenden</div>

<!-- Shortcuts bar -->
<div class="shortcuts" id="shortcuts">
  <span><kbd>Leertaste</kbd> Start / Pause</span>
  <span><kbd>R</kbd> Zurücksetzen</span>
  <span><kbd>F</kbd> Vollbild</span>
  <span><kbd>M</kbd> Spiegeln</span>
  <span><kbd>↑</kbd><kbd>↓</kbd> Geschwindigkeit</span>
  <span><kbd>+</kbd><kbd>-</kbd> Schriftgröße</span>
  <span><kbd>ESC</kbd> Bearbeiten</span>
</div>

<script>
  let scrollPos = 0;
  let scrollSpeed = 4;
  let fontSize = 48;
  let mirrored = false;
  let running = false;
  let paused = false;
  let animFrame = null;
  let lastTime = 0;

  const textInput = document.getElementById('textInput');
  const editPanel = document.getElementById('editPanel');
  const prompterWrap = document.getElementById('prompterWrap');
  const prompterContent = document.getElementById('prompterContent');
  const countdownEl = document.getElementById('countdown');
  const countdownNum = document.getElementById('countdownNum');
  const header = document.getElementById('header');
  const controls = document.getElementById('controls');
  const shortcuts = document.getElementById('shortcuts');
  const btnPause = document.getElementById('btnPause');
  const btnStop = document.getElementById('btnStop');
  const btnStart = document.getElementById('btnStart');
  const btnEdit = document.getElementById('btnEdit');
  const fsHint = document.getElementById('fsHint');

  // Default demo text
  textInput.value = `Willkommen beim freyaivisions Teleprompter.

Geben Sie hier Ihren Text ein oder fügen Sie ihn ein. Der Text scrollt automatisch mit einstellbarer Geschwindigkeit.

Nutzen Sie die Steuerung oben, um Geschwindigkeit, Schriftgröße und Spiegelung anzupassen.

Viel Erfolg bei Ihrer Präsentation!`;

  function updateSpeed() {
    scrollSpeed = parseInt(document.getElementById('speedRange').value);
    document.getElementById('speedValue').textContent = scrollSpeed;
  }

  function updateSize() {
    fontSize = parseInt(document.getElementById('sizeRange').value);
    document.getElementById('sizeValue').textContent = fontSize;
    prompterContent.style.fontSize = fontSize + 'px';
  }

  function toggleMirror() {
    mirrored = !mirrored;
    prompterContent.classList.toggle('mirrored', mirrored);
    document.getElementById('btnMirror').textContent = mirrored ? 'Gespiegelt' : 'Spiegeln';
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
      fsHint.classList.add('show');
      setTimeout(() => fsHint.classList.remove('show'), 2000);
    } else {
      document.exitFullscreen();
    }
  }

  function showEdit() {
    stopPrompt();
    editPanel.classList.remove('hidden');
    prompterWrap.classList.add('hidden');
    btnStart.style.display = '';
    btnEdit.style.display = 'none';
    btnPause.style.display = 'none';
    btnStop.style.display = 'none';
  }

  function startPrompt() {
    const text = textInput.value.trim();
    if (!text) return;

    // Prepare content
    const html = text.split('\n').map(line =>
      line.trim() === '' ? '<br><br>' : `<p>${line}</p>`
    ).join('');
    prompterContent.innerHTML = html;
    prompterContent.style.fontSize = fontSize + 'px';
    scrollPos = 0;
    prompterContent.style.transform = mirrored
      ? `scaleX(-1) translateY(0px)`
      : `translateY(0px)`;

    // Show prompter
    editPanel.classList.add('hidden');
    prompterWrap.classList.remove('hidden');
    btnStart.style.display = 'none';
    btnEdit.style.display = '';

    // Countdown
    let count = 3;
    countdownEl.classList.remove('hidden');
    countdownNum.textContent = count;

    const countInterval = setInterval(() => {
      count--;
      if (count <= 0) {
        clearInterval(countInterval);
        countdownEl.classList.add('hidden');
        beginScrolling();
      } else {
        countdownNum.textContent = count;
        // Re-trigger animation
        countdownNum.style.animation = 'none';
        void countdownNum.offsetWidth;
        countdownNum.style.animation = 'pulse 0.5s ease-in-out';
      }
    }, 800);
  }

  function beginScrolling() {
    running = true;
    paused = false;
    btnPause.style.display = '';
    btnPause.textContent = 'Pause';
    btnStop.style.display = '';
    lastTime = performance.now();
    animFrame = requestAnimationFrame(scroll);
  }

  function scroll(time) {
    if (!running) return;
    if (!paused) {
      const delta = (time - lastTime) / 16.67; // normalize to ~60fps
      scrollPos += scrollSpeed * 0.8 * delta;

      const maxScroll = prompterContent.scrollHeight - window.innerHeight + 100;
      if (scrollPos >= maxScroll) {
        scrollPos = maxScroll;
        running = false;
        btnPause.textContent = 'Ende';
        return;
      }

      if (mirrored) {
        prompterContent.style.transform = `scaleX(-1) translateY(-${scrollPos}px)`;
      } else {
        prompterContent.style.transform = `translateY(-${scrollPos}px)`;
      }
    }
    lastTime = time;
    animFrame = requestAnimationFrame(scroll);
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    btnPause.textContent = paused ? 'Weiter' : 'Pause';
    if (!paused) {
      lastTime = performance.now();
    }
  }

  function stopPrompt() {
    running = false;
    paused = false;
    if (animFrame) cancelAnimationFrame(animFrame);
    countdownEl.classList.add('hidden');
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    // Don't capture when typing in textarea
    if (e.target === textInput) return;

    switch(e.code) {
      case 'Space':
        e.preventDefault();
        if (!running && !prompterWrap.classList.contains('hidden')) {
          beginScrolling();
        } else if (!running && prompterWrap.classList.contains('hidden')) {
          // Skip countdown if counting down
          if (!countdownEl.classList.contains('hidden')) {
            countdownEl.classList.add('hidden');
            beginScrolling();
          } else {
            startPrompt();
          }
        } else {
          togglePause();
        }
        break;
      case 'KeyR':
        if (running || !prompterWrap.classList.contains('hidden')) {
          stopPrompt();
          startPrompt();
        }
        break;
      case 'KeyF':
        toggleFullscreen();
        break;
      case 'KeyM':
        toggleMirror();
        break;
      case 'ArrowUp':
        e.preventDefault();
        document.getElementById('speedRange').value = Math.min(10, scrollSpeed + 1);
        updateSpeed();
        break;
      case 'ArrowDown':
        e.preventDefault();
        document.getElementById('speedRange').value = Math.max(1, scrollSpeed - 1);
        updateSpeed();
        break;
      case 'Equal':
      case 'NumpadAdd':
        document.getElementById('sizeRange').value = Math.min(96, fontSize + 4);
        updateSize();
        break;
      case 'Minus':
      case 'NumpadSubtract':
        document.getElementById('sizeRange').value = Math.max(24, fontSize - 4);
        updateSize();
        break;
      case 'Escape':
        if (running || !prompterWrap.classList.contains('hidden')) {
          showEdit();
        }
        break;
    }
  });

  // Handle countdown skip with space
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !countdownEl.classList.contains('hidden')) {
      e.preventDefault();
      countdownEl.classList.add('hidden');
      if (!running) beginScrolling();
    }
  });
</script>

</body>
</html>
